<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superdesign Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f8fafc; --bg-card: #ffffff;
            --text-primary: #1a202c; --text-secondary: #718096; --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,.1); --shadow-hover: 0 10px 25px -5px rgba(0,0,0,.2);
        }
        [data-theme="dark"] {
            --bg-primary: #1a202c; --bg-secondary: #2d3748; --bg-card: #2d3748;
            --text-primary: #f7fafc; --text-secondary: #a0aec0; --border-color: #4a5568;
            --shadow: 0 4px 6px -1px rgba(0,0,0,.3); --shadow-hover: 0 10px 25px -5px rgba(0,0,0,.4);
        }
        body { font-family: 'SF Mono', Monaco, Consolas, 'Courier New', monospace; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 20px; transition: background .3s ease, color .3s ease; }
        .header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-start; }
        .header-content h1 { font-size: 2.5rem; margin-bottom: 8px; font-weight: 600; letter-spacing: -.02em; }
        .header-content p { color: var(--text-secondary); font-size: 1rem; }
        .header-controls { display: flex; gap: 12px; align-items: center; }
        .theme-toggle { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: .875rem; transition: all .2s ease; display: flex; align-items: center; gap: 8px; }
        .theme-toggle:hover { background: var(--bg-secondary); transform: translateY(-1px); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 24px; max-width: 1400px; }
        .design-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; transition: transform .2s ease, box-shadow .2s ease; }
        .design-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
        .design-header { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: flex-start; }
        .design-title { display: flex; align-items: center; gap: 8px; }
        .design-title h3 { font-size: 1rem; font-weight: 500; }
        .design-type { background: var(--bg-secondary); color: var(--text-secondary); padding: 4px 8px; border-radius: 4px; font-size: .75rem; }
        .design-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .design-size, .design-date { color: var(--text-secondary); font-size: .75rem; }
        .design-preview { height: 300px; position: relative; overflow: hidden; }
        .design-preview iframe { border: none; transform: scale(0.5); transform-origin: top left; width: 200%; height: 200%; }
        .design-actions { padding: 16px; display: flex; gap: 8px; }
        .btn-primary { background: #4299e1; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: .875rem; font-family: inherit; cursor: pointer; transition: background .2s ease; }
        .btn-primary:hover { background: #3182ce; }
        .btn-secondary { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 6px; font-size: .875rem; font-family: inherit; cursor: pointer; }
        .btn-secondary:hover { background: var(--border-color); }
        @media (max-width: 768px) { .gallery-grid { grid-template-columns: 1fr; } .design-preview { height: 200px; } .header { flex-direction: column; gap: 16px; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>superdesign.gallery</h1>
            <p id="file-count">2 designs — Formatador de Pendrive</p>
        </div>
        <div class="header-controls">
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span><span id="theme-text">Dark</span>
            </button>
        </div>
    </div>

    <div class="gallery-grid">
      <div class="design-card" data-file="desktop_app_for_form_1.html">
        <div class="design-header">
          <div class="design-title"><h3>Variação 1 — Compacto (estilo Rufus)</h3><span class="design-type">.HTML</span></div>
          <div class="design-meta"><span class="design-size">Painel único · 1 coluna</span></div>
        </div>
        <div class="design-preview"><iframe src="./design_iterations/desktop_app_for_form_1.html" loading="lazy"></iframe></div>
        <div class="design-actions">
          <button onclick="openFullscreen('./design_iterations/desktop_app_for_form_1.html')" class="btn-primary">Ver em tela cheia</button>
        </div>
      </div>

      <div class="design-card" data-file="desktop_app_for_form_2.html">
        <div class="design-header">
          <div class="design-title"><h3>Variação 2 — Espaçoso (2 colunas)</h3><span class="design-type">.HTML</span></div>
          <div class="design-meta"><span class="design-size">Painel único · 2 colunas</span></div>
        </div>
        <div class="design-preview"><iframe src="./design_iterations/desktop_app_for_form_2.html" loading="lazy"></iframe></div>
        <div class="design-actions">
          <button onclick="openFullscreen('./design_iterations/desktop_app_for_form_2.html')" class="btn-primary">Ver em tela cheia</button>
        </div>
      </div>
    </div>

    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        updateThemeButton();
        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeButton();
        }
        function updateThemeButton() {
            const t = document.documentElement.getAttribute('data-theme');
            document.getElementById('theme-icon').textContent = t === 'dark' ? '☀️' : '🌙';
            document.getElementById('theme-text').textContent = t === 'dark' ? 'Light' : 'Dark';
        }
        function openFullscreen(path) { window.open(path, '_blank'); }
    </script>
</body>
</html>
