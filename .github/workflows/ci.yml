name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  RUSTFLAGS: "-D warnings"
  CARGO_TERM_COLOR: always

# Dependências de sistema do eframe/egui no Linux (glow + wayland + x11).
# Reusadas pelos jobs que compilam a UI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Dependências de sistema (egui)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libxrandr-dev libxi-dev libxcursor-dev libgl1-mesa-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Dependências de sistema (egui)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libxrandr-dev libxi-dev libxcursor-dev libgl1-mesa-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Dependências de sistema (egui)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libxrandr-dev libxi-dev libxcursor-dev libgl1-mesa-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --workspace

  xtask-lints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask check # line-limit + pub-fields

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete
