[advisories]
version = 2

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",         # Boost (ex.: error-code)
    "MPL-2.0",
    "CC0-1.0",
    "OFL-1.1",         # fontes padrão do egui (epaint_default_fonts)
    "Ubuntu-font-1.0", # idem
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
